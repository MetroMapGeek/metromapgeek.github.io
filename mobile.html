<style>
/* Make the section and iframe truly full-screen */
.fullscreen-map-wrapper {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    margin: 0;
    padding: 0;
    z-index: 1;
}

/* Stabilize iframe rendering on mobile to prevent tile reloads */
.fullscreen-map-wrapper iframe {
    width: 100%;
    height: 100%;
    border: none;
    image-rendering: auto !important;
    transform: translateZ(0);
    backface-visibility: hidden;
    will-change: transform;
}
</style>

<div class="fullscreen-map-wrapper">
    <iframe src="https://umap.openstreetmap.fr/en/map/metromapsorg_1203972#2/0.0/-35.0" allowfullscreen="" loading="lazy">
    </iframe>
</div>

<script>
document.addEventListener("DOMContentLoaded", function () {
    const iframe = document.querySelector('.fullscreen-map-wrapper iframe');
    if (!iframe) return;

    iframe.onload = function () {
        try {
            const mapWindow = iframe.contentWindow;
            const L = mapWindow.L;

            if (!L) return;

            // Force high-res tiles and disable mobile downscaling
            L.Browser.retina = true;

            // Reduce tile reloads when panning/zooming
            L.Map.mergeOptions({
                fadeAnimation: false,
                zoomAnimation: false,
                markerZoomAnimation: false
            });

            // Keep more tiles in memory to avoid reloads
            L.TileLayer.prototype.options.updateWhenIdle = true;
            L.TileLayer.prototype.options.keepBuffer = 6;

        } catch (err) {
            console.warn("Could not access uMap iframe:", err);
        }
    };
});
</script>
</div>
